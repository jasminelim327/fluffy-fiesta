<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Export — Fluffy Fiesta</title>
  <style>
    body { margin: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 24px; }
    canvas { border: 1px solid #eee; border-radius: 8px; }
    button { background: #FF6B35; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 700; }
    button:hover { background: #e85e2a; }
    p { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <p>120×120 PNG — ready for Google Cloud Console</p>
  <canvas id="c" width="120" height="120"></canvas>
  <button onclick="download()">⬇️ Download logo.png</button>

  <script>
    const svg = `<svg width="120" height="120" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="38" rx="22" ry="24" fill="#FF8C55"/>
      <ellipse cx="36" cy="36" rx="20" ry="22" fill="#FFA06A"/>
      <ellipse cx="29" cy="33" rx="3.5" ry="4" fill="white"/>
      <ellipse cx="43" cy="33" rx="3.5" ry="4" fill="white"/>
      <circle cx="30" cy="34" r="2" fill="#333"/>
      <circle cx="44" cy="34" r="2" fill="#333"/>
      <path d="M28 41 Q36 48 44 41" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <rect x="10" y="14" width="5" height="5" rx="1" fill="#FFD166" transform="rotate(20 12 16)"/>
      <rect x="54" y="10" width="5" height="5" rx="1" fill="#4ECDC4" transform="rotate(-15 56 12)"/>
      <circle cx="16" cy="52" r="3" fill="#FF6B6B"/>
      <circle cx="58" cy="48" r="3" fill="#FFD166"/>
      <rect x="52" y="26" width="4" height="4" rx="1" fill="#FF6B6B" transform="rotate(30 54 28)"/>
      <rect x="13" y="30" width="4" height="4" rx="1" fill="#4ECDC4" transform="rotate(-20 15 32)"/>
    </svg>`;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = 'data:image/svg+xml;base64,' + btoa(svg);

    function download() {
      const a = document.createElement('a');
      a.download = 'fluffy-fiesta-logo.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
